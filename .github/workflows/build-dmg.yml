name: Build DMG

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ScreenGrid.dmg
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build universal release binary
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Assemble ScreenGrid.app
        run: |
          APP=build/ScreenGrid.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp .build/apple/Products/Release/ScreenGrid "$APP/Contents/MacOS/ScreenGrid"
          cp Support/Info.plist "$APP/Contents/Info.plist"

      - name: Compile app icon (Liquid Glass)
        run: |
          # actool ships with full Xcode, not the Command Line Tools; the
          # runner selects Xcode by default. Compiles Support/AppIcon.icon
          # into Contents/Resources/Assets.car, matching CFBundleIconName.
          xcrun actool Support/AppIcon.icon \
            --compile build/ScreenGrid.app/Contents/Resources \
            --app-icon AppIcon \
            --include-all-app-icons \
            --enable-on-demand-resources NO \
            --development-region en \
            --target-device mac \
            --minimum-deployment-target 26.0 \
            --platform macosx \
            --output-partial-info-plist "$RUNNER_TEMP/actool.plist" \
            --output-format human-readable-text --notices --warnings --errors

      - name: Codesign (ad-hoc)
        run: codesign --force --deep --sign - build/ScreenGrid.app

      - name: Read version
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" build/ScreenGrid.app/Contents/Info.plist)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        run: |
          STAGING=build/dmg
          mkdir -p "$STAGING"
          cp -R build/ScreenGrid.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "ScreenGrid" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "build/ScreenGrid-${{ steps.version.outputs.version }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ScreenGrid-${{ steps.version.outputs.version }}.dmg
          path: build/ScreenGrid-*.dmg
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --generate-notes build/ScreenGrid-*.dmg ||
          gh release upload "$GITHUB_REF_NAME" build/ScreenGrid-*.dmg --clobber
